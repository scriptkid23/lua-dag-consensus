# Devnet profile (spec §3.4).
#
# Loaded on top of `config/default.toml` (consensus tables).
# `local.toml` and `--override-config` paths layer on top of this file.
#
# Compose injects `LUA_DAG_NODE_IDENTITY_LABEL` and `LUA_DAG_BOOTSTRAP_PEERS`
# per service, so the four-node topology lives entirely in `docker-compose.yml`.

[node]
network_mode = "live"

[node.identity]
kind = "devnet_seed"
# Bare-metal default when running outside Compose; overridden by env or `--identity-label`.
label = "node0"

[net]
listen = ["/ip4/0.0.0.0/tcp/9000"]
bootstrap = []

[net.gossip]
heartbeat_ms = 700
mesh_n = 8
mesh_n_low = 6
mesh_n_high = 12

[net.peers]
max_peers = 64
ban_duration_secs = 600

[rocksdb]
path = "/data/rocksdb"
create_if_missing = true
max_total_wal_size_mb = 256
