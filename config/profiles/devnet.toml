# Devnet profile (spec §3.4).
#
# Loaded on top of `config/default.toml` (consensus tables).
# `local.toml` and `--override-config` paths layer on top of this file.
#
# Compose injects `LUA_DAG_NODE_IDENTITY_LABEL` and `LUA_DAG_BOOTSTRAP_PEERS`
# per service, so the four-node topology lives entirely in `docker-compose.yml`.

[node]
network_mode = "live"

[node.identity]
kind = "devnet_seed"
# Bare-metal default when running outside Compose; overridden by env or `--identity-label`.
label = "node0"

# Bootstrap validator set (keys derived from labels — see `node::devnet_keys`).
validator_set_path = "config/valsets/devnet-4.toml"

# L3 node production wiring complete (plan 06b-l3).
l3_wire_complete = true

# Blob payload custody + chunk gossip (plan 07b).
l1_blob_custody_enabled = true
blob_chunk_size_bytes = 65536

# RS erasure-coded blob shards (plan 07c).
l1_erasure_enabled = true
erasure_k = 4
erasure_n = 6
erasure_data_shard_size_bytes = 32768

[net]
listen = ["/ip4/0.0.0.0/tcp/9000"]
bootstrap = []

[net.gossip]
heartbeat_ms = 700
mesh_n = 8
mesh_n_low = 6
mesh_n_high = 12

[net.peers]
max_peers = 64
ban_duration_secs = 600

[rocksdb]
path = "/data/rocksdb"
create_if_missing = true
max_total_wal_size_mb = 256
