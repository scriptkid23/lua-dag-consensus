name: Docker smoke

on:
  pull_request:
  push:
    branches: [main]

jobs:
  single-replica:
    name: Single-replica readiness smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build node image
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: lua-node:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run single-replica smoke (poll /readyz)
        run: |
          set -euo pipefail
          docker run --rm -d --name lua-node-smoke -p 9100:9100 lua-node:ci
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:9100/readyz; then
              echo "single-replica ready"
              docker rm -f lua-node-smoke
              exit 0
            fi
            sleep 2
          done
          docker logs lua-node-smoke
          docker rm -f lua-node-smoke
          exit 1

  four-node-compose:
    name: Four-node Compose smoke (spec §8 acceptance)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: docker compose up
        run: docker compose up -d --build

      - name: Wait for all nodes healthy
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + 180 ))
          while :; do
            running=$(docker compose ps --status=running --services | wc -l)
            healthy=$(docker compose ps --format json \
              | jq -s 'if length == 0 then false else all(.[]; .Health == "healthy") end')
            if [ "$running" -ge 4 ] && [ "$healthy" = "true" ]; then
              echo "all four nodes healthy"
              break
            fi
            if [ $(date +%s) -gt $deadline ]; then
              echo "Timed out waiting for 4-node devnet healthy"
              docker compose logs --no-color
              exit 1
            fi
            sleep 3
          done

      - name: Probe each admin /readyz
        run: |
          set -euo pipefail
          for port in 9100 9101 9102 9103; do
            curl -fsS http://127.0.0.1:$port/readyz
          done

      - name: E2E — poll RPC until macro finality
        run: |
          chmod +x scripts/devnet_e2e_smoke.sh
          FINALIZE_TIMEOUT_SECS=300 ./scripts/devnet_e2e_smoke.sh

      - name: docker compose down
        if: always()
        run: docker compose down -v
